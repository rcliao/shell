name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # shell's go.mod replaces six sibling repos with local paths, so all
      # of them are checked out side by side with the shell checkout.
      - uses: actions/checkout@v4
        with:
          path: shell
      - uses: actions/checkout@v4
        with:
          repository: rcliao/ghost
          path: ghost
      - uses: actions/checkout@v4
        with:
          repository: rcliao/shell-imagen
          path: shell-imagen
      - uses: actions/checkout@v4
        with:
          repository: rcliao/shell-browser
          path: shell-browser
      - uses: actions/checkout@v4
        with:
          repository: rcliao/shell-secrets
          path: shell-secrets
      - uses: actions/checkout@v4
        with:
          repository: rcliao/shell-pm
          path: shell-pm
      - uses: actions/checkout@v4
        with:
          repository: rcliao/shell-tunnel
          path: shell-tunnel
      - uses: actions/setup-go@v5
        with:
          go-version-file: shell/go.mod
      - name: Vet
        working-directory: shell
        run: go vet ./...
      - name: Build
        working-directory: shell
        run: go build ./...
      - name: Tests
        working-directory: shell
        run: go test ./... -count=1
